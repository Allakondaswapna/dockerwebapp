version: "3.9"

services:

  devopsdb:
    image: allakondaswapna/automation:db
    ports:
      - "3306:3306"
    networks:
      - mynetwork
    

  application:
    image: allakondaswapna/automation:app
    ports:
      - "2222:8080"
    networks:
      - mynetwork
    depends_on:
      - devopsdb

networks:
  mynetwork:
    driver: overlay

