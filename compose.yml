version: "3.9"

services:
  devopsdb:
    image: allakondaswapna/newrepo:database
    ports:
      - "3306:3306"
    networks:
      - mynetwork
    volumes:
      - Docker-db:/var/lib/mysql
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 516M
        reservations:
          cpus: "0.25"
          memory: 256M

  application:
    image: allakondaswapna/newrepo:application
    ports:
      - "2222:8080"
    networks:
      - mynetwork
    volumes:
      - Docker-app:/usr/local/tomcat/webapps
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 516M
        reservations:
          cpus: "0.25"
          memory: 256M
    depends_on:
      - devopsdb

networks:
  mynetwork:
    driver: overlay

volumes:
  Docker-db:
  Docker-app:
