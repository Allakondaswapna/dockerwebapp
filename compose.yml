---
version: "3.9"

services:
  devopsdb:
    image: allakondaswapna/project:db
    ports:
      - "3306:3306"
    networks:
      - mynetwork
    deploy:
      replicas: 3

  application:
    image: allakondaswapna/project:app
    ports:
      - "1111:8080"
    networks:
      - mynetwork
    deploy:
      replicas: 3
    depends_on:
      - devopsdb

networks:
  mynetwork:
    driver: overlay
